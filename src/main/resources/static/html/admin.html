<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet"/>
    <style>
        body {
            background-color: rgb(209, 209, 209);
            font-family: 'Courier New', monospace;
            padding: 20px;
            text-align: center;
        }

        h1, h2 {
            margin-top: 30px;
            font-weight: bold;
        }

        /* Общие стили для таблиц */
        table {
            background-color: #fff;
            margin: 20px auto;
            border-collapse: collapse;
            width: 90%;
            max-width: 1000px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        th, td {
            border: 1px solid #999;
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: #444;
            color: #fff;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        /* Кнопки */
        .btn-delete {
            background-color: #d9534f;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-delete:hover {
            background-color: #c9302c;
        }

        .buttonProfile {
            font-size: 18px;
            background-color: #0a0a11;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
            transition: 0.3s;
        }

        .buttonProfile:disabled {
            background-color: #666;
        }

        img.displayed {
            margin: 30px auto;
            border: 2px solid #000;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@5.0.0/bundles/stomp.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>

    <script>
    var stompClient = null;

    // Подключаемся сразу при загрузке
    $(document).ready(connect);

    function setConnected(connected) {
        $("#profileButton").prop("disabled", !connected);
    }

    function connect() {
        const token = localStorage.getItem('jwt_token');

        if (!token) {
            console.error("Токен не найден, перенаправляем на логин");
            window.location.href = "/login.html";
            return;
        }

        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        // ВАЖНО: Добавляем токен в URL, как в рабочем примере
        const wsUrl = `${protocol}//${window.location.host}/websocket?token=${token}`;

        stompClient = new window.StompJs.Client({
            brokerURL: wsUrl,
            connectHeaders: {
                'Authorization': 'Bearer ' + token
            },
            reconnectDelay: 5000,
            heartbeatIncoming: 4000,
            heartbeatOutgoing: 4000
        });

        stompClient.onConnect = function (frame) {
            console.log('Connected to Admin Panel');
            setConnected(true);

            // Очищаем таблицы перед заполнением
            $("#users tbody").empty();
            $("#results tbody").empty();

            // Подписки
            stompClient.subscribe('/topic/users', (msg) => showUsers(msg.body));
            stompClient.subscribe('/topic/results', (msg) => showResults(msg.body));
            stompClient.subscribe('/user/queue/alert', (msg) => window.alert(msg.body));

            // Запрашиваем данные
            stompClient.publish({ destination: "/app/admin", body: "{}" });
            playSound('admin_sound');
        };

        stompClient.onWebSocketClose = () => {
            console.warn('WebSocket connection closed');
            setConnected(false);
        };

        stompClient.onStompError = (frame) => {
            console.error('STOMP Error:', frame);
        };

        stompClient.activate();
    }



    function deleteUser(id) {
        if(!confirm("Are you sure you want to delete user " + id + "?")) return;
        stompClient.publish({
            destination: "/app/admin/" + id,
            body: "{}"
        });
        // Пауза перед обновлением, чтобы сервер успел обработать удаление
        setTimeout(() => { window.location.reload(); }, 500);
    }

    function showUsers(usersData) {
        // Парсим строку в полноценный JavaScript-массив
        const usersList = typeof usersData === 'string' ? JSON.parse(usersData) : usersData;

        // Очищаем тело таблицы, чтобы при повторных вызовах данные не дублировались
        $("#users tbody").empty();

        // Проверяем, что пришёл массив, и перебираем его в цикле
        if (Array.isArray(usersList)) {
            usersList.forEach(user => {
                const displayRoles = user.roles || "USER";

                $("#users tbody").append(`
                <tr id="user-row-${user.id}">
                    <td>${user.id}</td>
                    <td>${user.username}</td>
                    <td>*</td>
                    <td>${displayRoles}</td>
                    <td>
                        <button class="btn-delete" onclick="deleteUser(${user.id})">
                            DELETE
                        </button>
                    </td>
                </tr>
            `);
            });
        } else {
            // На всякий случай оставляем старую одиночную логику как fallback
            const user = usersList;
            const displayRoles = user.roles || "USER";
            $("#users tbody").append(`<tr id="user-row-${user.id}"><td>${user.id}</td><td>${user.username}</td><td>*</td><td>${displayRoles}</td><td><button class="btn-delete" onclick="deleteUser(${user.id})">DELETE</button></td></tr>`);
        }
    }

    function showResults(gameData) {
        // Парсим прилетевшую gRPC статистику в массив
        const resultsList = typeof gameData === 'string' ? JSON.parse(gameData) : gameData;

        // Очищаем таблицу результатов перед заполнением
        $("#results tbody").empty();

        // Проверяем на массив и рендерим строки в цикле
        if (Array.isArray(resultsList)) {
            resultsList.forEach(res => {
                $("#results tbody").append(`
                <tr>
                    <td>${res.id}</td>
                    <td>${res.playerName}</td>
                    <td>${res.playerScore}</td>
                </tr>
            `);
            });
        } else {
            // Фоллбэк для одиночного объекта
            const res = resultsList;
            $("#results tbody").append(`<tr><td>${res.id}</td><td>${res.playerName}</td><td>${res.playerScore}</td></tr>`);
        }
    }

    $(function () {
        $("#profileButton").click(() => { window.location.href = "/html/profile.html"; });
    });

    function playSound(id) {
        const audio = document.getElementById(id);
        if (audio) audio.play().catch(e => console.log("Audio blocked by browser"));
    }
</script>

</head>
<body>

<h1>ALL REGISTERED USERS</h1>
<table id="users">
    <thead>
    <tr>
        <th>ID</th>
        <th>USER</th>
        <th>PASSWORD</th>
        <th>ROLES</th>
        <th>CONTROLS</th>
    </tr>
    </thead>
    <tbody><!-- Сюда JS добавит строки --></tbody>
</table>

<h2>USERS BEST SCORES</h2>
<table id="results">
    <thead>
    <tr>
        <th>ID</th>
        <th>PLAYER</th>
        <th>SCORE</th>
    </tr>
    </thead>
    <tbody><!-- Сюда JS добавит строки --></tbody>
</table>

<button id="profileButton" disabled class="buttonProfile">Go to Profile</button>

<div id="images">
    <img class="displayed" src="/img/black.png" alt="Admin Decor" width="240" height="384">
</div>

<audio id="admin_sound" src="/sounds/admin.mp3" preload="auto"></audio>

</body>
</html>
