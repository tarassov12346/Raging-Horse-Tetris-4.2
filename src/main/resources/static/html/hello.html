<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Tetris - Welcome</title>
    <!-- Bootstrap 3 оставляем для сетки, если нужно -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/3.3.7/css/bootstrap.css" rel="stylesheet"/>

    <style>
        body {
            font-family: 'Courier New', monospace;
            background-color: #ff0000; /* Резануло глаз, но стиль уважаю :) */
            color: #000;
            text-align: center;
            padding: 20px;
        }
        #helloBox { font-size: 45px; display: block; margin-bottom: 10px; }
        #bestPlayerBox, #bestScoreBox { font-size: 28px; display: block; }
        .image-container { margin: 20px auto; }
        img { display: block; margin: 10px auto; border: 2px solid black; }

        /* Стиль для нового блока аватарки */
        #avatarContainer {
            margin: 15px auto;
            display: none; /* Изначально скрыт, пока не загрузится Base64 */
        }
        #playerAvatar {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%; /* Делаем аватарку красивой круглой */
            border: 3px solid black;
        }

        #controls {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .btn-custom {
            font-size: 18px;
            padding: 10px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        .buttonStart { background-color: #0a0a23; color: #fff; font-weight: bold; }
        .buttonProfile, .buttonAdmin { background-color: #222; color: #fff; }
        .btn-custom:disabled { background-color: #555; cursor: not-allowed; opacity: 0.6; }
        .btn-custom:hover:not(:disabled) { transform: scale(1.05); filter: brightness(1.2); }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@5.0.0/bundles/stomp.umd.js"></script>

    <script>
        let stompClient = null;

        // Сразу пытаемся подключиться
        $(document).ready(connect);

        function setConnected(connected) {
            $("#controls button").prop("disabled", !connected);
        }

        function connect() {
            const token = localStorage.getItem('jwt_token');

            console.log("=== DEBUG START ===");
            console.log("Token exists:", !!token);
            console.log("Token value (first 10 chars):", token ? token.substring(0, 10) + "..." : "NULL");

            if (!token) {
                window.location.href = "/login"; // Упростили путь, Gateway разберется
                return;
            }

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/websocket?token=${token}`;

            stompClient = new window.StompJs.Client({
                brokerURL: wsUrl,
                connectHeaders: { 'Authorization': `Bearer ${token}` },
                reconnectDelay: 5000,
                heartbeatIncoming: 4000,
                heartbeatOutgoing: 4000
            });

            stompClient.onConnect = (frame) => {
                console.log('Connected via Gateway');
                setConnected(true);

                // 1. ПОДПИСКА НА СКЛЕЕННЫЕ ДАННЫЕ (РЕКОРДЫ + АВАТАРКА) ИЗ ПРИВАТНОЙ ОЧЕРЕДИ ЮЗЕРА
                stompClient.subscribe('/user/queue/welcomeData', (msg) => {
                    const data = JSON.parse(msg.body);
                    console.log("Received welcome data:", data);

                    // Выводим данные лучшего игрока из рекорда PlayerWelcomeDTO (поля: bestPlayer, bestScore)
                    $("#bestPlayerBox").text(`Wanna challenge ${data.bestPlayer || 'None'}?`);
                    $("#bestScoreBox").text(`with score ${data.bestScore || 0}`);

                    // Обрабатываем аватарку из MongoDB
                    if (data.avatarBase64 && data.avatarBase64.trim() !== "") {
                        // Подставляем Base64 строку прямо в src картинки
                        $("#playerAvatar").attr("src", "data:image/png;base64," + data.avatarBase64);
                        $("#avatarContainer").fadeIn(300); // Плавно показываем аватарку
                    } else {
                        $("#avatarContainer").hide(); // Скрываем, если картинки нет в БД
                    }
                });

                // Старая общая подписка (оставляем для совместимости, если нужно)
                stompClient.subscribe('/topic/daoGameObjects', (msg) => {
                    const data = JSON.parse(msg.body);
                    $("#bestPlayerBox").text(`Wanna challenge ${data.bestPlayer || 'None'}?`);
                    $("#bestScoreBox").text(`with score ${data.bestScore || 0}`);
                });

                stompClient.subscribe('/user/queue/gameObjects', (msg) => {
                    const data = JSON.parse(msg.body);
                    $("#helloBox").text(`Hello ${data.playerName || 'Player'}! WELCOME!`);
                });

                // Уведомляем сервер. Сервер возьмет UserID из Principal (из токена)
                stompClient.publish({ destination: "/app/hello" });

                const audio = document.getElementById('hello_sound');
                if (audio) audio.play().catch(() => console.log("Autoplay blocked"));
            };

            stompClient.onStompError = (frame) => {
                console.error('STOMP Error', frame);
                if (frame.headers['message'] && frame.headers['message'].includes("UNAUTHORIZED")) {
                    window.location.href = "/login";
                }
            };

            stompClient.activate();
        }

        $(function () {
            $("#startGameButton").click(() => window.location.href = "/html/index.html");
            $("#adminButton").click(() => window.location.href = "/html/admin.html");
            $("#profileButton").click(() => window.location.href = "/html/profile.html");
        });
    </script>
</head>
<body>
<header>
    <div id="helloBox">Loading...</div>

    <!-- НОВЫЙ БЛОК ДЛЯ ОТОБРАЖЕНИЯ АВАТАРКИ ЛУЧШЕГО ИГРОКА -->
    <div id="avatarContainer">
        <img id="playerAvatar" src="" alt="Лучший игрок">
    </div>

    <div id="bestPlayerBox"></div>
    <div id="bestScoreBox"></div>
</header>

<div class="image-container">
    <img src="/img/black.png" alt="Tetris" width="240" height="384">
    <img src="/img/raging.jpg" alt="Raging Horse" width="120" height="120">
</div>

<div id="controls">
    <button id="startGameButton" disabled class="btn-custom buttonStart">Start Game</button>
    <button id="profileButton" disabled class="btn-custom buttonProfile">Your Profile</button>
    <button id="adminButton" disabled class="btn-custom buttonAdmin">Admin</button>
</div>

<audio id="hello_sound" src="/sounds/hello.mp3" preload="auto"></audio>
</body>
</html>
