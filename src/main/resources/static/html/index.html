<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Tetris</title>

    <style>
        body {
           font-family: 'Courier New', monospace;
           font-size: 14px;
           background-color: rgb(255, 255, 128);
           text-align: center; /* Центрирование контента */
        }

        /* Главная настройка для сетки Тетриса */
        #table {
            background-color: #ffffff;
            border: 1px black solid;
            border-collapse: collapse; /* Склеивает границы ячеек */
            border-spacing: 0;         /* Убирает промежутки */
            margin: 0 auto;            /* Центрирование таблицы */
        }

        #table td {
            padding: 0;                /* Убирает внутренние отступы в ячейках */
            line-height: 0;            /* Убирает межстрочные интервалы */
        }

        #table img {
            display: block;            /* Убирает микро-отступ под картинкой */
            width: 25px;               /* Настрой размер под свои картинки, если нужно */
            height: 25px;
        }

        /* Стиль для информационной таблицы */
        .info-table {
            background-color: #ffffff;
            border: 1px black solid;
            border-collapse: collapse;
            margin: 10px auto;
            width: 600px;
        }

        .info-table td {
            border: 1px solid black;
            padding: 5px;
        }

        #controls {
            margin-top: 15px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@5.0.0/bundles/stomp.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>

    <script>

    let isRecordSent = false; // Глобальный флаг

    var stompClient = null;
    var score = 0;
    var isGameOverSoundPlayed = false;

    // Извлекаем токен, сохраненный при логине
    const token = localStorage.getItem('jwt_token');

    if (!token) {
        console.error("JWT не найден. Редирект на логин.");
        window.location.href = "/html/login.html";
    }

    setTimeout(connect, 500);

    function setConnected(connected) {
        $("#leftButton, #rightButton, #rotateButton, #dropButton, #newGameButton, #saveButton, #restartButton")
            .prop("disabled", !connected);
    }

    function connect() {
    const token = localStorage.getItem('jwt_token');
    if (!token) {
        window.location.href = "/html/login.html";
        return;
    }

    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    // ОБЯЗАТЕЛЬНО добавляем токен в Query-параметр для Gateway
    const wsUrl = `${protocol}//${window.location.host}/websocket?token=${token}`;

    stompClient = new window.StompJs.Client({
        brokerURL: wsUrl, // Теперь токен внутри URL
        connectHeaders: {
            'Authorization': 'Bearer ' + token // Оставляем для интерцептора внутри микросервиса
        },
        // Убираем webSocketFactory, если не используете SockJS,
        // brokerURL в v5 достаточно.
        reconnectDelay: 5000,
        heartbeatIncoming: 4000,
        heartbeatOutgoing: 4000,
        debug: (str) => { console.log("STOMP Debug:", str); }
    });

    stompClient.onConnect = function (frame) {
        console.log('Connected successfully!');

        playSound('snap_sound');

        stompClient.subscribe('/user/queue/stateObjects', (s) => showState(s.body));
        stompClient.subscribe('/user/queue/stateFinal', (s) => showFinalState(s.body));
        stompClient.subscribe('/user/queue/stateSaved', (s) => showSavedState(s.body));
        stompClient.subscribe('/topic/daoGameObjects', (s) => showDaoGame(s.body));

        setConnected(true);
        stompClient.publish({ destination: "/app/start", body: JSON.stringify({}) });
    };

    stompClient.onStompError = (frame) => {
        console.error('Broker reported error: ' + frame.headers['message']);
    };

    stompClient.activate();
}


    function updateMatrix(matrix) {
        for (let i = 0; i < 20; i++) {
            for (let j = 0; j < 12; j++) {
                // matrix[i][j] содержит символ ('I', 'J', '0' и т.д.)
                $("#c" + i + "v" + j).attr("src", "/img/" + matrix[i][j] + ".png");
            }
        }
    }

    function showState(state) {
        // Парсим JSON (если WebSocket не сделал этого автоматически)
        var json = typeof state === 'string' ? JSON.parse(state) : state;

        // Поля теперь берутся напрямую из рекорда GameStateDTO
        var status = json.running;
        var currentScore = json.playerScore;

        console.log('SHOWING STATE');

        if (currentScore > score) {
            playSound('score_sound');
            score = currentScore;
        }

        // Обращаемся напрямую к полям рекорда
        $("#playerBox").text(json.playerName);
        $("#playerScoreBox").text(score);
        $("#tetrisSpeedBox").text('TETRIS at speed ' + (Math.floor(score / 10) + 1));

        if (status) {
            isRecordSent = false; // Сбрасываем при старте новой игры
            $("#gameStatusBox").text('Game status: ON');
            // В рекорде поле cells лежит в корне, а не в stage
            updateMatrix(json.cells);
        } else {
            if (!isRecordSent) { // Шлем только один раз
                record();
                isRecordSent = true;
            }
            $("#gameStatusBox").text('Game status: PLS WAIT!!!');


            if (!isGameOverSoundPlayed) {
                playSound('registered_sound');
                isGameOverSoundPlayed = true;
            }
            snapShot();
        }
    }


    function showFinalState(state) {
        // Парсим JSON, если данные пришли строкой
        var json = typeof state === 'string' ? JSON.parse(state) : state;

        $("#gameStatusBox").text('Game status: OVER');

        // В рекорде GameStateDTO поле cells лежит напрямую в json
        updateMatrix(json.cells);

        $("#newGameButton").prop("disabled", false);

        if (!isGameOverSoundPlayed) {
            playSound('registered_sound');
            isGameOverSoundPlayed = true;
        }

        // Переход на страницу результата через 3 секунды (если нужно)
        // setTimeout(() => { window.location.href = "/html/snapShot.html"; }, 3000);
    }


    function showSavedState(state) {
        // Парсим JSON, если данные пришли строкой
        var json = typeof state === 'string' ? JSON.parse(state) : state;

        $("#gameStatusBox").text('Game is Saved!!!');

        // В рекорде GameStateDTO поле cells лежит напрямую в json, а не в stage
        updateMatrix(json.cells);

        alert("Game saved successfully!");
    }


    // А вот логику внутри showDaoGame нужно обновить под поля Рекорда:
    function showDaoGame(message) {
        const data = JSON.parse(message);

        // Используем поля из твоего GameDataDTO: bestPlayer и bestScore
        $("#bestPlayerBox").text(`${data.bestPlayer || 'None'}`);
        $("#bestPlayerScoreBox").text(`${data.bestScore || 0}`);

        // Если у тебя там была еще какая-то логика отрисовки,
        // убедись, что она тоже использует новые имена полей.
        console.log("Received Record data:", data);
    }

    // Инициализация таблицы при загрузке
    $(function() {
        var tableHtml = "";
        for (var i = 0; i < 20; i++) {
            tableHtml += "<tr>";
            for (var j = 0; j < 12; j++) {
                tableHtml += '<td><img id="c' + i + 'v' + j + '" src="/img/0.png" width="25" height="25"></td>';
            }
            tableHtml += "</tr>";
        }
        $("#table").html(tableHtml);

        $("#newGameButton").click(() => {
            isGameOverSoundPlayed = false;
            window.location.href = "/html/hello.html";
        });

        $("#leftButton").click(() => stompClient.publish({ destination: "/app/2" }));
        $("#rightButton").click(() => stompClient.publish({ destination: "/app/3" }));
        $("#rotateButton").click(() => stompClient.publish({ destination: "/app/1" }));
        $("#dropButton").click(() => stompClient.publish({ destination: "/app/4" }));
        $("#saveButton").click(() => stompClient.publish({ destination: "/app/save" }));
        $("#restartButton").click(() => stompClient.publish({ destination: "/app/restart" }));
    });

    function snapShot() { stompClient.publish({ destination: "/app/snapShot" }); }
    function record() {stompClient.publish({ destination: "/app/record" });}
    function playSound(id) {
        var audio = document.getElementById(id);
        if (!audio) return;
        if (id === 'game_sound' && !audio.paused) return;
        if (id !== 'game_sound') audio.currentTime = 0;
        audio.play().catch(e => console.log("Audio play blocked"));
    }

    document.onkeydown = function(e) {
        if (!stompClient || !stompClient.connected) return;
        if (e.keyCode == 37) stompClient.publish({ destination: "/app/2" }); // Left
        if (e.keyCode == 39) stompClient.publish({ destination: "/app/3" }); // Right
        if (e.keyCode == 40) stompClient.publish({ destination: "/app/4" }); // Drop
        if (e.keyCode == 38) stompClient.publish({ destination: "/app/1" }); // Rotate
    };
</script>

</head>
<body>


<!-- Обертка, которая держит таблицу в центре, а ковбоя — сбоку -->
<div class="game-area-wrapper">
    <h1 id="tetrisSpeedBox">&nbsp;</h1>
    <h2 id="gameStatusBox">&nbsp;</h2>
    <!-- Ковбой СЛЕВА -->
    <div id="rodeo-zone-left" class="rodeo-box">
        <img src="/img/rodeo.gif" class="ragingHorse" alt="Raging Horse Left">
        <div class="dust-cloud"></div>
    </div>

    <table class="info-table">
        <tr>
            <td><b> Player </b></td>
            <td id="playerBox"></td>
            <td><b> Score </b></td>
            <td id="playerScoreBox"></td>
        </tr>
        <tr>
            <td><b> Best Player </b></td>
            <td id="bestPlayerBox"></td>
            <td><b> Best Score </b></td>
            <td id="bestPlayerScoreBox"></td>
        </tr>
    </table>

    <table id="table">
        <!-- Сетка генерируется скриптом -->
    </table>
    <!-- Ковбой СПРАВА (добавленный) -->
    <div id="rodeo-zone-right" class="rodeo-box">
        <img src="/img/rodeo.gif" class="ragingHorse" alt="Raging Horse Right">
        <div class="dust-cloud"></div>
    </div>

</div>

<style>
    .game-area-wrapper {
        position: relative;
        display: inline-block;
        margin: 20px auto;
    }

    /* Общие стили для обоих ковбоев */
    .rodeo-box {
        position: absolute;
        top: 50px;
        width: 200px;
        height: 150px;
        display: flex;
        justify-content: center;
        align-items: flex-end;
    }

    /* Позиция СЛЕВА */
    #rodeo-zone-left {
        left: -250px;
    }

    /* Позиция СПРАВА */
    #rodeo-zone-right {
        right: -250px;
    }

    /* Отражаем правого ковбоя по горизонтали, чтобы он смотрел на таблицу */
    #rodeo-zone-right .ragingHorse {
        transform: scaleX(-1);
    }

    .ragingHorse {
        width: 180px;
        height: auto;
        z-index: 10;
        animation: bucking 0.8s infinite ease-in-out;
        filter: drop-shadow(5px 5px 10px rgba(0,0,0,0.2));
    }

    /* Совмещаем анимацию брыкания с отражением для правого ковбоя */
    #rodeo-zone-right .ragingHorse {
        animation: bucking-right 0.8s infinite ease-in-out;
    }

    /* Твоя пыль (остается без изменений) */
    .dust-cloud {
        position: absolute;
        bottom: 10px;
        width: 60px;
        height: 15px;
        background: rgba(139, 69, 19, 0.3);
        border-radius: 50%;
        filter: blur(5px);
        animation: dust 0.8s infinite;
    }

    /* Анимация для левого (обычная) */
    @keyframes bucking {
        0%   { transform: translateY(0) rotate(0deg); }
        25%  { transform: translateY(-15px) rotate(-5deg); }
        50%  { transform: translateY(5px) rotate(5deg); }
        75%  { transform: translateY(-10px) rotate(-2deg); }
        100% { transform: translateY(0) rotate(0deg); }
    }

    /* Анимация для правого (с сохранением отражения scaleX(-1)) */
    @keyframes bucking-right {
        0%   { transform: scaleX(-1) translateY(0) rotate(0deg); }
        25%  { transform: scaleX(-1) translateY(-15px) rotate(5deg); }
        50%  { transform: scaleX(-1) translateY(5px) rotate(-5deg); }
        75%  { transform: scaleX(-1) translateY(-10px) rotate(2deg); }
        100% { transform: scaleX(-1) translateY(0) rotate(0deg); }
    }

    @keyframes dust {
        0%, 100% { transform: scale(1); opacity: 0.3; }
        50% { transform: scale(1.5); opacity: 0.1; }
    }

    /* Стили таблицы остаются прежними */
    #table {
        border-collapse: collapse;
        border-spacing: 0;
        margin: 0 auto !important;
    }
    #table td { padding: 0; line-height: 0; }
    #table img { display: block; width: 25px; height: 25px; }
</style>



<div id="controls">
    <button id="leftButton" disabled>Left</button>
    <button id="rotateButton" disabled>Rotate</button>
    <button id="dropButton" disabled>Drop</button>
    <button id="newGameButton" disabled>NewGame</button>
    <button id="saveButton" disabled>Save</button>
    <button id="restartButton" disabled>Restart</button>
    <button id="rightButton" disabled>Right</button>
</div>

<!-- Замените свои аудио-теги на эти -->
<audio id="game_sound" src="/sounds/0.mp3" loop preload="auto"></audio>
<audio id="score_sound" src="/sounds/score.mp3" preload="auto"></audio>
<audio id="snap_sound" src="/sounds/snap.mp3" preload="auto"></audio>
<audio id="registered_sound" src="/sounds/registered.mp3" preload="auto"></audio>

</body>
</html>
