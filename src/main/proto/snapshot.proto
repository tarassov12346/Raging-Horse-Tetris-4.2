syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.app.service.grpc";

package snapshot;

service SnapshotService {
  // Наш единственный gRPC метод
  rpc UploadSnapShot (SnapshotRequest) returns (SnapshotResponse);
  // Новый метод для MugShot (фото профиля)
  rpc UploadMugShot (MugShotRequest) returns (SnapshotResponse);

  // Новый метод для получения байтов из Mongo
  rpc DownloadBytes (DownloadRequest) returns (DownloadResponse);
  // НОВЫЙ метод для сохранения игры
  rpc SaveGame (SaveGameRequest) returns (SnapshotResponse);
  // Метод для загрузки игры (Restart)
  rpc GetSavedGame (GetSavedGameRequest) returns (GetSavedGameResponse);
}



message SnapshotRequest {
  string playerName = 1;
  string fileName = 2;
  bytes data = 3; // Бинарные данные скриншота
}

message SnapshotResponse {
  string message = 1;
  bool success = 2;
}
// --- ТЕБЕ НУЖНО ДОБАВИТЬ ЭТОТ БЛОК НИЖЕ ---

message MugShotRequest {
  string playerName = 1;
  bytes data = 2;
}

message DownloadRequest {
  string playerName = 1;
  string fileName = 2;
}

message DownloadResponse {
  bytes data = 1;
}

message SaveGameRequest {
  string playerName = 1;
  int32 playerScore = 2;
  // char[][] превращаем в список строк
  repeated string rows = 3;
}

message GetSavedGameRequest {
  string playerName = 1;
}

message GetSavedGameResponse {
  bool found = 1;
  string playerName = 2;
  int32 playerScore = 3;
  repeated string rows = 4;
}